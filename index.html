<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Weather Dashboard</title>
    <style>
        #weather-card {
            border: 1px solid #ccc;
            padding: 20px;
            width: 320px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            box-shadow: 2px 2px 10px #eee;
        }
        .hourly-list {
            list-style: none;
            padding: 0;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #eee;
        }
        .gps-footer {
            margin-top: 20px;
            font-size: 0.8em;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div id="weather-card">
    <h2>Weather Dashboard</h2>
    <input type="text" id="locationInput" placeholder="Zip code or City, State">
    <button onclick="handleManualInput()">Search</button>
    <button onclick="handleGPS()">Use GPS LOC</button>
    <div id="weather-data">Loading...</div>
    <div id="gps-info" class="gps-footer"></div>
</div>

<script>
    async function fetchWithTimeout(url, timeout = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
    }

    async function fetchWeather(lat, lon) {
        const weatherDiv = document.getElementById('weather-data');
        weatherDiv.innerText = "Loading...";
        document.getElementById('gps-info').innerText = `Coords: ${parseFloat(lat).toFixed(4)}, ${parseFloat(lon).toFixed(4)}`;
        
        try {
            const locRes = await fetchWithTimeout(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
            const locData = await locRes.json();
            const locationName = `${locData.city || 'Unknown'}, ${locData.principalSubdivision || ''}`;

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,wind_speed_10m,wind_direction_10m,precipitation_probability,visibility&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min,uv_index_max,sunrise,sunset&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
            const weatherRes = await fetchWithTimeout(url);
            const data = await weatherRes.json();

            const curr = data.current;
            const daily = data.daily;
            const hourly = data.hourly;
            const formatTime = (isoString) => new Date(isoString).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const today = new Date().toISOString().split('T')[0];
            
            let hourlyHtml = '<h4>Today\'s Forecast:</h4><ul class="hourly-list">';
            for(let i = 0; i < hourly.time.length; i++) {
                if (hourly.time[i].startsWith(today)) {
                    hourlyHtml += `<li>${formatTime(hourly.time[i])} - ${hourly.temperature_2m[i]}°F</li>`;
                }
            }
            hourlyHtml += '</ul>';

            weatherDiv.innerHTML = `
                <p><strong>Location:</strong> ${locationName}</p>
                <p><strong>Temp:</strong> ${curr.temperature_2m}°F (Feels like: ${curr.apparent_temperature}°F)</p>
                <p><strong>Daily Range:</strong> ${daily.temperature_2m_min[0]}°F - ${daily.temperature_2m_max[0]}°F</p>
                <p><strong>Visibility:</strong> ${(curr.visibility / 1609.34).toFixed(1)} miles</p>
                <p><strong>UV Index:</strong> ${daily.uv_index_max[0]}</p>
                <p><strong>Sun:</strong> ↑ ${formatTime(daily.sunrise[0])} | ↓ ${formatTime(daily.sunset[0])}</p>
                <p><strong>Wind:</strong> ${curr.wind_speed_10m} mph from ${curr.wind_direction_10m}°</p>
                <p><strong>Humidity:</strong> ${curr.relative_humidity_2m}%</p>
                <p><strong>Precipitation:</strong> ${curr.precipitation} in</p>
                <p><strong>Chance of Rain:</strong> ${curr.precipitation_probability}%</p>
                ${hourlyHtml}
            `;
        } catch (error) {
            weatherDiv.innerText = "Error loading data. Please check connection.";
        }
    }

    async function handleManualInput() {
        const query = document.getElementById('locationInput').value;
        try {
            const response = await fetchWithTimeout(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=us`);
            const data = await response.json();
            if (data && data.length > 0) fetchWeather(data[0].lat, data[0].lon);
            else alert("Location not found.");
        } catch (e) { alert("Geocoding failed."); }
    }

    async function handleGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                () => getLocationByIP()
            );
        } else {
            getLocationByIP();
        }
    }

    async function getLocationByIP() {
        try {
            const response = await fetchWithTimeout("https://ipapi.co/json/");
            const data = await response.json();
            fetchWeather(data.latitude, data.longitude);
        } catch (e) {
            document.getElementById('weather-data').innerText = "Location services unavailable.";
        }
    }

    window.onload = handleGPS;
</script>
</body>
</html>
