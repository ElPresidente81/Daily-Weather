<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Report</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        #card { border: 1px solid #ccc; padding: 20px; width: 300px; border-radius: 10px; }
        .label { font-weight: bold; font-size: 0.7rem; color: #666; text-transform: uppercase; margin-top: 15px; display: block; }
        .val { font-weight: bold; font-size: 1rem; }
        .temp { font-size: 3rem; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>
<div id="card">
    <div id="data">Loading...</div>
</div>
<script>
    async function updateWeather(lat, lon) {
        try {
            const geo = await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`)).json();
            const addr = geo.address || {};
            
            // Line 1: As specific as possible, or UNKNOWN
            const line1 = addr.village || addr.town || addr.city || addr.municipality || "UNKNOWN";
            // Line 2: Specific source
            const line2 = addr.town || addr.city || "Weather Station";
            // Line 3: County/State/Regional info
            const line3 = `${addr.county || ''} ${addr.state || ''}`.trim();

            const weather = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&temperature_unit=fahrenheit`)).json();

            document.getElementById('data').innerHTML = `
                <span class="label">Current Location:</span><div class="val">${line1}</div>
                <span class="label">Weather Source:</span><div class="val">Station: ${line2}</div>
                <span class="label">Additional Location Info:</span><div class="val">${line3}</div>
                <div class="temp">${Math.round(weather.current.temperature_2m)}°F</div>
                <button onclick="getLocation()">Refresh</button>
            `;
        } catch(e) { document.getElementById('data').innerHTML = "Error loading data."; }
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (p) => updateWeather(p.coords.latitude, p.coords.longitude),
                async () => {
                    const ip = await (await fetch("https://ipapi.co/json/")).json();
                    updateWeather(ip.latitude, ip.longitude);
                }
            );
        }
    }
    getLocation();
</script>
</body>
</html>
