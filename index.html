<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Weather</title>
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        #weather-card { background: white; padding: 30px; width: 320px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #4a5568; margin-bottom: 20px; }
        .temp-hero { font-size: 4rem; font-weight: bold; color: #2d3748; margin: 10px 0; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .data-bubble { background: #f7fafc; padding: 15px; border-radius: 15px; font-size: 0.9rem; color: #4a5568; }
        .loc-main { color: #2d3748; font-weight: 800; font-size: 1.2rem; margin: 0; }
        .loc-sub { color: #718096; font-size: 0.9rem; margin: 2px 0; }
    </style>
</head>
<body>
<div id="weather-card">
    <h2>Daily Weather</h2>
    <input type="text" id="locationInput" placeholder="Zip or City">
    <button onclick="handleManualInput()">Go</button>
    <div id="weather-data">Loading...</div>
</div>
<script>
    async function fetchWithTimeout(url, timeout = 5000) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(id);
        return response;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 3958.8;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
        return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
    }

    async function fetchWeather(lat, lon) {
        const weatherDiv = document.getElementById('weather-data');
        weatherDiv.innerHTML = "Loading...";
        try {
            const locRes = await fetchWithTimeout(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
            const locData = await locRes.json();
            
            const nearRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&zoom=10&featuretype=city&format=json`);
            const nearData = await nearRes.json();
            
            // Constructing the name cleanly
            let rawName = locData.locality || locData.city || "Unknown Location";
            let cleanName = rawName.replace(/^(Township of|City of|Village of)\s+/i, "");
            
            // If it's a township, explicitly add "Township" back to the end
            if (rawName.toLowerCase().includes("township")) {
                cleanName = `${cleanName} Township`;
            }

            const state = locData.principalSubdivisionCode ? locData.principalSubdivisionCode.split('-')[1] : locData.principalSubdivision;
            const line1 = `${cleanName}, ${state}`;
            const line2 = `(${locData.principalSubdivision || 'Unknown Region'}, United States)`;
            
            let line3 = "";
            if (nearData && nearData.address) {
                const city = nearData.address.city || nearData.address.town || "";
                if (city && city.toLowerCase() !== cleanName.toLowerCase()) {
                    const dist = getDistance(lat, lon, nearData.lat, nearData.lon);
                    line3 = `(Nearest city: ${city}, ${dist} miles)`;
                }
            }

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,wind_speed_10m,wind_direction_10m,precipitation_probability,visibility&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
            const data = await (await fetchWithTimeout(url)).json();
            const c = data.current;
            
            weatherDiv.innerHTML = `
                <p class="loc-main">${line1}</p>
                <p class="loc-sub">${line2}</p>
                ${line3 ? `<p class="loc-sub">${line3}</p>` : ''}
                <div class="temp-hero">${Math.round(c.temperature_2m)}°</div>
                <p>Feels like ${Math.round(c.apparent_temperature)}°</p>
                <div class="grid-container">
                    <div class="data-bubble">💧 ${c.relative_humidity_2m}%<br>Humidity</div>
                    <div class="data-bubble">💨 ${c.wind_speed_10m} mph<br>Wind</div>
                    <div class="data-bubble">🌧️ ${c.precipitation_probability}%<br>Rain</div>
                    <div class="data-bubble">👁️ ${(c.visibility / 1609.34).toFixed(1)} mi<br>Visibility</div>
                </div>
                <button onclick="handleGPS()" style="background:#e2e8f0; color:#4a5568; margin-top:10px; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">Refresh Location</button>
            `;
        } catch (e) { weatherDiv.innerHTML = "Error loading data."; }
    }

    async function handleManualInput() {
        const query = document.getElementById('locationInput').value;
        if (!query) return;
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=us`);
            const data = await response.json();
            if (data.length > 0) fetchWeather(data[0].lat, data[0].lon);
            else alert("Location not found.");
        } catch (e) { alert("Geocoding failed."); }
    }

    async function handleGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude),
                () => getLocationByIP()
            );
        } else { getLocationByIP(); }
    }

    async function getLocationByIP() {
        try {
            const data = await (await fetch("https://ipapi.co/json/")).json();
            fetchWeather(data.latitude, data.longitude);
        } catch (e) {
            document.getElementById('weather-data').innerHTML = "Location services unavailable.";
        }
    }
    window.onload = handleGPS;
</script>
</body>
</html>
