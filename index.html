<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 10px 40px; 
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box; 
            transition: background 0.3s;
        }
        
        body.dark-mode { background: linear-gradient(135deg, #1a202c, #2d3748); }
        body.dark-mode .card, body.dark-mode .box, body.dark-mode .time-block, body.dark-mode .controls { background: #2d3748; color: #f7fafc; border-color: #4a5568; }
        body.dark-mode .page-title, body.dark-mode .temp, body.dark-mode .box-val, body.dark-mode .location-text { color: #f7fafc; }
        
        /* Base (Mobile) Styles */
        .card { 
            background: white; 
            padding: 15px; 
            width: 100%; 
            max-width: 360px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .page-title { color: #2c3e50; margin: 0; font-size: 1.1rem; font-weight: 700; }
        .theme-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        
        #alertBanner { background: #e53e3e; color: white; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 0.8rem; text-align: center; display: none; font-weight: 700; }
        
        .main-weather { background: rgba(66, 153, 225, 0.1); border-radius: 16px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .condition-icon { font-size: 2.5rem; margin-bottom: -10px; transition: all 0.3s ease;}
        .temp { font-size: 4rem; font-weight: 700; color: #2d3748; line-height: 1; margin: 10px 0; letter-spacing: -2px; }
        .condition-text { font-size: 1rem; color: #4a5568; font-weight: 500; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .box { background: #f8fafc; padding: 10px 8px; border-radius: 16px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .box-title { font-size: 0.7rem; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .box-val { font-size: 1rem; color: #2d3748; font-weight: 700; margin-top: 5px; }

        .gauge-container { width: 70px; height: 40px; position: relative; margin-top: 5px; }
        .gauge-svg { width: 100%; height: 100%; overflow: visible; }
        .gauge-bg { fill: none; stroke: #e2e8f0; stroke-width: 8; stroke-linecap: round; }
        .gauge-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease-out; }

        .sun-box { background: rgba(237, 137, 54, 0.1); }
        .sun-icon { font-size: 1.3rem; margin: 5px 0; }

        .forecast-section { margin-bottom: 10px; }
        .forecast-btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .forecast-btn { flex: 1; padding: 10px; background: #edf2f7; color: #4a5568; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: background 0.2s; font-size: 0.8rem; }
        .forecast-btn:hover { background: #e2e8f0; }
        .forecast-btn.active-close { background: #cbd5e1; color: #2d3748; }

        .scroll-container { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; scroll-behavior: smooth; }
        .scroll-container::-webkit-scrollbar { display: none; }
        .time-block { min-width: 60px; text-align: center; background: #f8fafc; padding: 10px 5px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .time-block.current { background: #3182ce; color: white; border-color: #3182ce; }
        .block-label { font-size: 0.7rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .block-val { font-size: 1rem; font-weight: 700; }
        .block-icon { font-size: 1.2rem; margin: 2px 0; }
        .hidden { display: none; }

        .controls { background: #f1f5f9; padding: 12px; border-radius: 16px; margin-top: 10px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter', sans-serif; }
        input:focus { outline: none; border-color: #3182ce; }
        .button-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; }
        .button-row button { flex: 1; padding: 10px 5px; border: none; background: #3182ce; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: background 0.2s; }
        .button-row button:hover { background: #2b6cb0; }
        .or-label { font-size: 0.75rem; color: #a0aec0; font-weight: 700; }
        
        /* New Footer Styling */
        .footer-info { margin-top: 15px; text-align: center; }
        .pill-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .pill { background: #e2e8f0; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; color: #4a5568; }
        .location-text { font-size: 0.9rem; color: #718096; font-weight: 600; }
        .coords { font-size: 0.7rem; color: #a0aec0; margin-top: 5px; }

        /* Tablet Adjustments */
        @media (min-width: 600px) {
            .card { max-width: 600px; padding: 25px; }
            .grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 15px; }
            .temp { font-size: 5rem; }
            .main-weather { padding: 20px; margin-bottom: 15px; }
            .box { padding: 15px 10px; }
            .controls { padding: 20px; margin-top: 15px; }
            .forecast-btn { font-size: 0.9rem; padding: 12px; }
            .time-block { min-width: 75px; padding: 15px 8px; }
            .button-row button { padding: 12px 10px; font-size: 0.9rem; }
            .page-title { font-size: 1.3rem; }
        }

        /* Desktop PC Adjustments */
        @media (min-width: 900px) {
            .card { max-width: 800px; padding: 35px; }
            .temp { font-size: 6.5rem; margin: 15px 0; }
            .condition-icon { font-size: 3.5rem; }
            .condition-text { font-size: 1.2rem; }
            .box-val { font-size: 1.2rem; }
            .box-title { font-size: 0.8rem; }
            .button-row { gap: 15px; }
            .forecast-btn { font-size: 1rem; padding: 15px; }
            .time-block { min-width: 90px; }
            .block-val { font-size: 1.2rem; }
            .block-label { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <h1 class="page-title">Daily Weather</h1>
        <button class="theme-btn" onclick="document.body.classList.toggle('dark-mode')">☀️/🌙</button>
    </div>
    
    <div id="alertBanner">⚠️ Alert: Severe Weather</div>

    <div id="ui">
        <div style="text-align:center; padding: 20px; color: #718096;">Fetching localized data...</div>
    </div>
    
    <div class="controls">
        <input type="text" id="manualLoc" placeholder="Enter city, zip, or GPS...">
        <div class="button-row">
            <button onclick="handleManual()">Search Location</button>
            <span class="or-label">OR</span>
            <button onclick="getLocation()">Use Current GPS</button>
        </div>
    </div>
</div>

<script>
    function getWeatherCondition(code) {
        const map = {
            0: { text: "Clear Sky", icon: "☀️" },
            1: { text: "Mainly Clear", icon: "🌤️" },
            2: { text: "Partly Cloudy", icon: "⛅" },
            3: { text: "Overcast", icon: "☁️" },
            45: { text: "Fog", icon: "🌫️" },
            48: { text: "Depositing Rime Fog", icon: "🌫️" },
            51: { text: "Light Drizzle", icon: "🌧️" },
            53: { text: "Moderate Drizzle", icon: "🌧️" },
            55: { text: "Dense Drizzle", icon: "🌧️" },
            61: { text: "Slight Rain", icon: "🌦️" },
            63: { text: "Moderate Rain", icon: "🌧️" },
            65: { text: "Heavy Rain", icon: "🌧️" },
            71: { text: "Slight Snow", icon: "🌨️" },
            73: { text: "Moderate Snow", icon: "❄️" },
            75: { text: "Heavy Snow", icon: "❄️" },
            95: { text: "Thunderstorm", icon: "⛈️" }
        };
        return map[code] || { text: "Unknown", icon: "🌡️" };
    }

    function createGauge(val, min, max, color) {
        let percent = (val - min) / (max - min);
        if (percent < 0) percent = 0;
        if (percent > 1) percent = 1;
        const circumference = Math.PI * 35; 
        const offset = circumference * (1 - percent);
        return `
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M 15 45 A 35 35 0 0 1 85 45" />
                    <path class="gauge-fill" d="M 15 45 A 35 35 0 0 1 85 45" 
                        stroke="${color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" />
                </svg>
            </div>
        `;
    }

    function formatTime(time24) {
        let [h, m] = time24.split(':');
        h = parseInt(h, 10);
        let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12; 
        return `${h}:${m} ${ampm}`;
    }

    window.toggleForecast = function(type) {
        const hContainer = document.getElementById('hourlyContainer');
        const wContainer = document.getElementById('weeklyContainer');
        const btnRow = document.getElementById('forecast-btn-container');

        if (type === 'hourly') {
            hContainer.classList.remove('hidden');
            wContainer.classList.add('hidden');
            btnRow.innerHTML = `<button class="forecast-btn active-close" onclick="toggleForecast('none')">Close Hourly Forecast ✖</button>`;
            const targetId = hContainer.getAttribute('data-current-hour-id');
            const currentHourEl = document.getElementById(targetId);
            if (currentHourEl) currentHourEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        } else if (type === 'weekly') {
            wContainer.classList.remove('hidden');
            hContainer.classList.add('hidden');
            btnRow.innerHTML = `<button class="forecast-btn active-close" onclick="toggleForecast('none')">Close Weekly Forecast ✖</button>`;
        } else {
            hContainer.classList.add('hidden');
            wContainer.classList.add('hidden');
            btnRow.innerHTML = `
                <button class="forecast-btn" onclick="toggleForecast('hourly')">Hourly</button>
                <button class="forecast-btn" onclick="toggleForecast('weekly')">7-Day</button>
            `;
        }
    };

    async function fetchWeather(lat, lon, label) {
        let displayLabel = label;
        if (label === "GPS Detected" || label === "IP Detected") {
            try {
                const geo = await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`)).json();
                if (geo.address && (geo.address.city || geo.address.town || geo.address.county)) {
                    displayLabel = geo.address.city || geo.address.town || geo.address.county;
                }
            } catch (e) { console.log("Reverse geocode failed."); }
        }

        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode&hourly=temperature_2m&daily=sunrise,sunset,temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
        const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`;
        
        let weather, aqiData;
        try {
            const [weatherRes, aqiRes] = await Promise.all([
                fetch(weatherUrl),
                fetch(aqiUrl).catch(() => null) 
            ]);
            weather = await weatherRes.json();
            if (aqiRes && aqiRes.ok) aqiData = await aqiRes.json();
        } catch (error) { return; }

        const c = weather.current;
        const d = weather.daily;
        const h = weather.hourly;
        const condition = getWeatherCondition(c.weathercode);
        const currentLocalHour = parseInt(c.time.substring(11, 13), 10);
        
        let aqiVal = aqiData && aqiData.current ? aqiData.current.us_aqi : "N/A";
        let aqiColor = "#718096";
        let aqiLabel = "Unknown";
        
        if (aqiVal !== "N/A") {
            if (aqiVal <= 50) { aqiColor = "#38a169"; aqiLabel = "Good"; }
            else if (aqiVal <= 100) { aqiColor = "#d69e2e"; aqiLabel = "Moderate"; }
            else if (aqiVal <= 150) { aqiColor = "#dd6b20"; aqiLabel = "Sensitive"; }
            else if (aqiVal <= 200) { aqiColor = "#e53e3e"; aqiLabel = "Unhealthy"; }
            else { aqiColor = "#805ad5"; aqiLabel = "Hazardous"; }
        }

        document.getElementById('alertBanner').style.display = (c.weathercode >= 95) ? 'block' : 'none';
        const aqLink = `https://www.airnow.gov/?city=${displayLabel.split(',')[0]}&state=&country=USA`;

        let hourlyHTML = '';
        for(let i = 0; i < 24; i++) {
            let displayHour = i === 0 ? 12 : (i > 12 ? i - 12 : i);
            let ampm = i < 12 ? 'AM' : 'PM';
            let isCurrent = i === currentLocalHour;
            hourlyHTML += `<div class="time-block ${isCurrent ? 'current' : ''}" id="hour-block-${i}"><div class="block-label">${displayHour} ${ampm}</div><div class="block-val">${Math.round(h.temperature_2m[i])}°</div></div>`;
        }

        let weeklyHTML = '';
        for(let i = 0; i < d.time.length; i++) {
            let dateStr = d.time[i] + 'T12:00:00'; 
            let dateObj = new Date(dateStr);
            let dayName = dateObj.toLocaleDateString('en-US', {weekday: 'short'});
            if (i === 0) dayName = "Today";
            let dayCond = getWeatherCondition(d.weathercode[i]);
            weeklyHTML += `
                <div class="time-block">
                    <div class="block-label">${dayName}</div>
                    <div class="block-icon">${dayCond.icon}</div>
                    <div class="block-val" style="font-size: 0.9rem; display: flex; gap: 5px; justify-content: center;">
                        <span style="color:#e67a22">${Math.round(d.temperature_2m_max[i])}°</span>
                        <span style="color:#718096">${Math.round(d.temperature_2m_min[i])}°</span>
                    </div>
                </div>`;
        }

        document.getElementById('ui').innerHTML = `
            <div class="main-weather">
                <div class="condition-icon">${condition.icon}</div>
                <div class="temp">${Math.round(c.temperature_2m)}°</div>
                <div class="condition-text">${condition.text}</div>
            </div>

            <div class="grid">
                <div class="box">
                    <div class="box-title">Today's Range</div>
                    ${createGauge(c.temperature_2m, d.temperature_2m_min[0], d.temperature_2m_max[0], "#ed8936")}
                    <div class="box-val">${Math.round(d.temperature_2m_min[0])}° - ${Math.round(d.temperature_2m_max[0])}°</div>
                </div>
                <div class="box">
                    <div class="box-title">Humidity 💧</div>
                    ${createGauge(c.relative_humidity_2m, 0, 100, "#4299e1")}
                    <div class="box-val">${c.relative_humidity_2m}%</div>
                </div>
                <div class="box">
                    <div class="box-title">Wind 💨</div>
                    ${createGauge(c.wind_speed_10m, 0, 40, "#9f7aea")}
                    <div class="box-val">${c.wind_speed_10m} mph</div>
                </div>
                <div class="box sun-box">
                    <div class="box-title">Sun Cycle</div>
                    <div class="sun-icon">🌅</div>
                    <div class="box-val" style="font-size: 0.85rem;">
                        ${formatTime(d.sunrise[0].split('T')[1])} <br> 
                        <span style="color: #718096; font-size: 0.7rem;">to</span> <br> 
                        ${formatTime(d.sunset[0].split('T')[1])}
                    </div>
                </div>
            </div>

            <div class="forecast-section">
                <div id="forecast-btn-container" class="forecast-btn-row">
                    <button class="forecast-btn" onclick="toggleForecast('hourly')">Hourly</button>
                    <button class="forecast-btn" onclick="toggleForecast('weekly')">7-Day</button>
                </div>
                <div id="hourlyContainer" class="hidden" data-current-hour-id="hour-block-${currentLocalHour}"><div class="scroll-container">${hourlyHTML}</div></div>
                <div id="weeklyContainer" class="hidden"><div class="scroll-container">${weeklyHTML}</div></div>
            </div>

            <div class="footer-info">
                <div class="pill-container">
                    <span class="pill">☔ Rain: ${d.precipitation_probability_max[0]}%</span>
                    <a href="${aqLink}" target="_blank" style="text-decoration: none;">
                        <span class="pill" style="cursor: pointer;">🍃 AQI: ${aqiVal} <span style="color: ${aqiColor};">(${aqiLabel})</span></span>
                    </a>
                </div>
                <div class="location-text">📍 ${displayLabel}</div>
                <div class="coords">Coords: ${Number(lat).toFixed(4)}, ${Number(lon).toFixed(4)}</div>
            </div>
        `;
    }

    async function handleManual() {
        const query = document.getElementById('manualLoc').value.trim();
        if (!query) return;
        const ddmRegex = /([NS])\s*(\d+)°?\s*([\d.]+)\s*([EW])\s*(\d+)°?\s*([\d.]+)/i;
        const match = query.match(ddmRegex);
        if (match) {
            let lat = Number(match[2]) + (Number(match[3]) / 60);
            if (match[1].toUpperCase() === 'S') lat = -lat;
            let lon = Number(match[5]) + (Number(match[6]) / 60);
            if (match[4].toUpperCase() === 'W') lon = -lon;
            fetchWeather(lat, lon, query);
            return;
        }
        const res = await (await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`)).json();
        if(res.length > 0) { fetchWeather(res[0].lat, res[0].lon, query); }
        else { alert("Location not found."); }
    }

    function getLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            (p) => fetchWeather(p.coords.latitude, p.coords.longitude, "GPS Detected"),
            async () => {
                const ip = await (await fetch("https://ipapi.co/json/")).json();
                fetchWeather(ip.latitude, ip.longitude, "IP Detected");
            }
        );
    }
    
    getLocation();
</script>
</body>
</html>
