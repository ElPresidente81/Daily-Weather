<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px 10px 40px; /* Reduced top padding to 15px */
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .page-title { 
            color: #2c3e50; 
            margin-top: 0; /* Removed top margin */
            margin-bottom: 15px; 
            font-size: 1.6rem; 
            text-align: center; 
            font-weight: 700;
        }
        .card { 
            background: white; 
            padding: 20px; /* Slightly tighter padding for mobile */
            width: 340px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            box-sizing: border-box;
        }
        
        /* Main Weather Section */
        .main-weather {
            background: rgba(66, 153, 225, 0.1);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        .condition-icon { font-size: 2.5rem; margin-bottom: -10px; }
        .temp { font-size: 4rem; font-weight: 700; color: #2d3748; line-height: 1; margin: 10px 0; letter-spacing: -2px; }
        .condition-text { font-size: 1rem; color: #4a5568; font-weight: 500; }

        /* Gauges & Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { 
            background: #f8fafc; 
            padding: 12px 8px; 
            border-radius: 16px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        .box-title { font-size: 0.7rem; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
        .box-val { font-size: 1rem; color: #2d3748; font-weight: 700; margin-top: 5px; }

        /* SVG Gauge Styles */
        .gauge-container { width: 70px; height: 40px; position: relative; margin-top: 5px; }
        .gauge-svg { width: 100%; height: 100%; overflow: visible; }
        .gauge-bg { fill: none; stroke: #e2e8f0; stroke-width: 8; stroke-linecap: round; }
        .gauge-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease-out; }

        /* Sunrise/Sunset Specific */
        .sun-box { background: rgba(237, 137, 54, 0.1); }
        .sun-icon { font-size: 1.3rem; margin: 5px 0; }

        /* Hourly Forecast Styles */
        .hourly-section { margin-bottom: 15px; }
        .hourly-btn { 
            width: 100%; padding: 10px; background: #edf2f7; color: #4a5568; 
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer; 
            transition: background 0.2s; font-size: 0.85rem;
        }
        .hourly-btn:hover { background: #e2e8f0; }
        .hourly-scroll { 
            display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; 
            scroll-behavior: smooth; 
        }
        .hourly-scroll::-webkit-scrollbar { display: none; } /* Hide scrollbar for a clean look */
        .hour-block { 
            min-width: 60px; text-align: center; background: #f8fafc; 
            padding: 10px 5px; border-radius: 12px; border: 1px solid #e2e8f0;
        }
        .hour-block.current { background: #3182ce; color: white; border-color: #3182ce; }
        .hour-time { font-size: 0.7rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .hour-temp { font-size: 1rem; font-weight: 700; }
        .hidden { display: none; }

        /* Search & Controls Section */
        .controls { background: #f1f5f9; padding: 15px; border-radius: 16px; margin-top: 5px; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter', sans-serif; }
        input:focus { outline: none; border-color: #3182ce; }
        .button-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 8px; }
        .button-row button { 
            flex: 1; padding: 10px 5px; border: none; background: #3182ce; 
            color: white; border-radius: 8px; cursor: pointer; font-weight: 600; 
            font-size: 0.8rem; transition: background 0.2s;
        }
        .button-row button:hover { background: #2b6cb0; }
        .or-label { font-size: 0.75rem; color: #a0aec0; font-weight: 700; }
        
        .footer-info { margin-top: 15px; text-align: center; font-size: 0.7rem; color: #a0aec0; }
    </style>
</head>
<body>

<h1 class="page-title">Daily Weather Dashboard</h1>

<div class="card">
    <div id="ui">
        <div style="text-align:center; padding: 20px; color: #718096;">Fetching localized data...</div>
    </div>
    
    <div class="controls">
        <input type="text" id="manualLoc" placeholder="Enter city, zip, or GPS...">
        <div class="button-row">
            <button onclick="handleManual()">Search Location</button>
            <span class="or-label">OR</span>
            <button onclick="getLocation()">Use Current GPS</button>
        </div>
    </div>
</div>

<script>
    // Translates WMO weather codes into text and icons
    function getWeatherCondition(code) {
        const map = {
            0: { text: "Clear Sky", icon: "☀️" },
            1: { text: "Mainly Clear", icon: "🌤️" },
            2: { text: "Partly Cloudy", icon: "⛅" },
            3: { text: "Overcast", icon: "☁️" },
            45: { text: "Fog", icon: "🌫️" },
            48: { text: "Depositing Rime Fog", icon: "🌫️" },
            51: { text: "Light Drizzle", icon: "🌧️" },
            53: { text: "Moderate Drizzle", icon: "🌧️" },
            55: { text: "Dense Drizzle", icon: "🌧️" },
            61: { text: "Slight Rain", icon: "🌦️" },
            63: { text: "Moderate Rain", icon: "🌧️" },
            65: { text: "Heavy Rain", icon: "🌧️" },
            71: { text: "Slight Snow", icon: "🌨️" },
            73: { text: "Moderate Snow", icon: "❄️" },
            75: { text: "Heavy Snow", icon: "❄️" },
            95: { text: "Thunderstorm", icon: "⛈️" }
        };
        return map[code] || { text: "Unknown", icon: "🌡️" };
    }

    // Generates the SVG HTML for a solid semi-circle gauge
    function createGauge(val, min, max, color) {
        let percent = (val - min) / (max - min);
        if (percent < 0) percent = 0;
        if (percent > 1) percent = 1;
        
        const circumference = Math.PI * 35; // ~109.95
        const offset = circumference * (1 - percent);

        return `
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M 15 45 A 35 35 0 0 1 85 45" />
                    <path class="gauge-fill" d="M 15 45 A 35 35 0 0 1 85 45" 
                          stroke="${color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" />
                </svg>
            </div>
        `;
    }

    // Toggles the hourly tape and smoothly scrolls to the current hour
    window.toggleHourly = function() {
        const container = document.getElementById('hourlyScrollContainer');
        if (container.classList.contains('hidden')) {
            container.classList.remove('hidden');
            const targetId = container.getAttribute('data-current-hour-id');
            const currentHourEl = document.getElementById(targetId);
            if (currentHourEl) {
                // Smoothly scroll the element to the center of the scrollable container
                currentHourEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        } else {
            container.classList.add('hidden');
        }
    };

    async function fetchWeather(lat, lon, label) {
        let displayLabel = label;
        if (label === "GPS Detected" || label === "IP Detected") {
            try {
                const geo = await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`)).json();
                if (geo.address && (geo.address.city || geo.address.town || geo.address.county)) {
                    displayLabel = geo.address.city || geo.address.town || geo.address.county;
                }
            } catch (e) { console.log("Reverse geocode failed."); }
        }

        // Added hourly=temperature_2m to the API call
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weathercode&hourly=temperature_2m&daily=sunrise,sunset,temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
        const weather = await (await fetch(url)).json();
        
        const c = weather.current;
        const d = weather.daily;
        const h = weather.hourly;
        const condition = getWeatherCondition(c.weathercode);

        // Extract the exact hour from the API's localized current time (format: YYYY-MM-DDTHH:MM)
        const currentLocalHour = parseInt(c.time.substring(11, 13), 10);

        // Build the 24-hour tape HTML
        let hourlyHTML = '';
        for(let i = 0; i < 24; i++) {
            // Convert index to 12-hour format string (e.g., "2 PM")
            let displayHour = i === 0 ? 12 : (i > 12 ? i - 12 : i);
            let ampm = i < 12 ? 'AM' : 'PM';
            let timeStr = `${displayHour} ${ampm}`;
            
            let isCurrent = i === currentLocalHour;
            let currentClass = isCurrent ? 'current' : '';
            
            hourlyHTML += `
                <div class="hour-block ${currentClass}" id="hour-block-${i}">
                    <div class="hour-time">${timeStr}</div>
                    <div class="hour-temp">${Math.round(h.temperature_2m[i])}°</div>
                </div>
            `;
        }

        document.getElementById('ui').innerHTML = `
            <div class="main-weather">
                <div class="condition-icon">${condition.icon}</div>
                <div class="temp">${Math.round(c.temperature_2m)}°</div>
                <div class="condition-text">${condition.text}</div>
            </div>

            <div class="grid">
                <div class="box">
                    <div class="box-title">Today's Range</div>
                    ${createGauge(c.temperature_2m, d.temperature_2m_min[0], d.temperature_2m_max[0], "#ed8936")}
                    <div class="box-val">${Math.round(d.temperature_2m_min[0])}° - ${Math.round(d.temperature_2m_max[0])}°</div>
                </div>
                <div class="box">
                    <div class="box-title">Humidity 💧</div>
                    ${createGauge(c.relative_humidity_2m, 0, 100, "#4299e1")}
                    <div class="box-val">${c.relative_humidity_2m}%</div>
                </div>
                <div class="box">
                    <div class="box-title">Wind 💨</div>
                    ${createGauge(c.wind_speed_10m, 0, 40, "#9f7aea")}
                    <div class="box-val">${c.wind_speed_10m} mph</div>
                </div>
                <div class="box sun-box">
                    <div class="box-title">Sun Cycle</div>
                    <div class="sun-icon">🌅</div>
                    <div class="box-val" style="font-size: 0.85rem;">
                        ${d.sunrise[0].split('T')[1]} <br> 
                        <span style="color: #718096; font-size: 0.7rem;">to</span> <br> 
                        ${d.sunset[0].split('T')[1]}
                    </div>
                </div>
            </div>

            <div class="hourly-section">
                <button class="hourly-btn" onclick="toggleHourly()">View Hourly Forecast</button>
                <div id="hourlyScrollContainer" class="hidden" data-current-hour-id="hour-block-${currentLocalHour}">
                    <div class="hourly-scroll">
                        ${hourlyHTML}
                    </div>
                </div>
            </div>

            <div class="footer-info">
                📍 <b>${displayLabel}</b> <br>
                Coords: ${Number(lat).toFixed(4)}, ${Number(lon).toFixed(4)}
            </div>
        `;
    }

    async function handleManual() {
        const query = document.getElementById('manualLoc').value.trim();
        if (!query) return;

        const ddmRegex = /([NS])\s*(\d+)°?\s*([\d.]+)\s*([EW])\s*(\d+)°?\s*([\d.]+)/i;
        const match = query.match(ddmRegex);
        
        if (match) {
            let lat = Number(match[2]) + (Number(match[3]) / 60);
            if (match[1].toUpperCase() === 'S') lat = -lat;
            let lon = Number(match[5]) + (Number(match[6]) / 60);
            if (match[4].toUpperCase() === 'W') lon = -lon;
            fetchWeather(lat, lon, query);
            return;
        }

        const res = await (await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`)).json();
        if(res.length > 0) {
            fetchWeather(res[0].lat, res[0].lon, query);
        } else {
            alert("Location not found. Please try a valid city, zip code, or GPS coordinate.");
        }
    }

    function getLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            (p) => fetchWeather(p.coords.latitude, p.coords.longitude, "GPS Detected"),
            async () => {
                const ip = await (await fetch("https://ipapi.co/json/")).json();
                fetchWeather(ip.latitude, ip.longitude, "IP Detected");
            }
        );
    }
    
    getLocation();
</script>
</body>
</html>
