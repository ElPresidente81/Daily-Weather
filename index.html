<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 25px; width: 320px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .label { font-size: 0.7rem; color: #777; font-weight: bold; text-transform: uppercase; margin-top: 15px; display: block; }
        .val { font-size: 1rem; color: #333; font-weight: 600; margin-bottom: 5px; }
        .temp { font-size: 4rem; font-weight: bold; text-align: center; margin: 20px 0; color: #2d3748; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .box { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; font-size: 0.8rem; }
        .footer-info { margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; font-size: 0.75rem; color: #888; }
        input { width: 100%; padding: 10px; margin-top: 15px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; border: none; background: #3182ce; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <div id="ui">Loading...</div>
    <input type="text" id="manualLoc" placeholder="Enter city or zip...">
    <button onclick="handleManual()">Search Location</button>
    <button onclick="getLocation()">Use GPS Location</button>
</div>
<script>
    async function fetchWeather(lat, lon, label) {
        const geo = await (await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10`)).json();
        const addr = geo.address || {};
        const weather = await (await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=sunrise,sunset&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`)).json();
        
        const c = weather.current;
        const d = weather.daily;
        document.getElementById('ui').innerHTML = `
            <div class="temp">${Math.round(c.temperature_2m)}°F</div>
            <div class="grid">
                <div class="box">Humidity<br><b>${c.relative_humidity_2m}%</b></div>
                <div class="box">Wind<br><b>${c.wind_speed_10m} mph</b></div>
            </div>
            <div class="grid">
                <div class="box">Sunrise<br><b>${d.sunrise[0].split('T')[1]}</b></div>
                <div class="box">Sunset<br><b>${d.sunset[0].split('T')[1]}</b></div>
            </div>
            <div class="footer-info">
                <div>Location: ${label}</div>
                <div>Coords: ${lat.toFixed(4)}, ${lon.toFixed(4)}</div>
            </div>
        `;
    }

    async function handleManual() {
        const query = document.getElementById('manualLoc').value;
        const res = await (await fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`)).json();
        if(res.length > 0) fetchWeather(res[0].lat, res[0].lon, query);
    }

    function getLocation() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
            (p) => fetchWeather(p.coords.latitude, p.coords.longitude, "GPS Detected"),
            async () => {
                const ip = await (await fetch("https://ipapi.co/json/")).json();
                fetchWeather(ip.latitude, ip.longitude, "IP Detected");
            }
        );
    }
    getLocation();
</script>
</body>
</html>
